name: Daily 3am Audit & Fix
on:
  schedule:
    - cron: '0 3 * * *'

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      
      - run: npm ci
      
      - run: npm audit fix --force || true
      
      - name: Commit & push fixes
        run: |
          git config user.name "Audit Bot"
          git config user.email "audit-bot@camplojack.local"
          git add -A
          git commit -m "chore: auto npm audit fix" || echo "No changes"
          git push
